document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4d17ba86-ad12-4f61-a7d8-b0fceaa86e45\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n  <meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n  <meta name=\"apple-mobile-web-app-status-bar-style\" content=\"default\">\n  <meta name=\"apple-mobile-web-app-title\" content=\"GrowthLine\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover\">\n  <script src=\"f81765d9-2449-4e7e-9e56-fce1e158c576\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: #F2F2F7; }\n    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }\n    input[type=number] { -moz-appearance: textfield; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: #F2F2F7; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;\">\n    <div style=\"position: relative; min-height: 100vh; background: #F2F2F7; padding-top: calc(env(safe-area-inset-top, 0px) + 14px); padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 24px); box-sizing: border-box;\">\n\n      <div style=\"display: flex; align-items: center; gap: 12px; padding: 0 20px 20px;\">\n        <div style=\"width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(160deg, oklch(62% 0.1 200), oklch(50% 0.1 205)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 6px oklch(50% 0.1 205 / 35%);\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 26 26\" fill=\"none\">\n            <path d=\"M3 20 C 7 20, 8 12, 12 12 C 15 12, 15 16, 18 16 C 21.5 16, 21 6, 23 4\" stroke=\"#fff\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n            <circle cx=\"23\" cy=\"4\" r=\"1.8\" fill=\"#fff\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family: -apple-system, ui-rounded, system-ui, sans-serif; font-weight: 700; font-size: 21px; color: oklch(20% 0.02 220); letter-spacing: -0.01em; line-height: 1.15;\">GrowthLine<\u002Fdiv>\n          <div style=\"font-size: 13px; color: oklch(56% 0.035 220); margin-top: 1px;\">Growth SDS calculator<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 0 20px 8px;\">\n        <div style=\"font-size: 13px; font-weight: 600; color: oklch(56% 0.035 220); text-transform: uppercase; letter-spacing: 0.02em; padding: 0 4px 6px;\">Patient<\u002Fdiv>\n        <div style=\"background: #fff; border-radius: 14px; overflow: hidden;\">\n\n          <div style=\"padding: 10px 16px; border-bottom: 0.5px solid oklch(90% 0.005 240);\">\n            <div role=\"radiogroup\" aria-label=\"Sex\" style=\"display: flex; background: oklch(93% 0.008 220); border-radius: 8px; padding: 2px; gap: 2px;\">\n              <sc-for list=\"{{ sexOptions }}\" as=\"opt\" hint-placeholder-count=\"2\">\n                <button onclick=\"{{ opt.onClick }}\" aria-pressed=\"{{ opt.active }}\" style=\"flex: 1; padding: 7px; border: none; border-radius: 6px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; color: {{ opt.color }}; background: {{ opt.bg }}; box-shadow: {{ opt.shadow }};\">{{ opt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid oklch(90% 0.005 240);\">\n            <label for=\"gl-years\" style=\"font-size: 15px; color: oklch(20% 0.02 220);\">Age<\u002Flabel>\n            <div style=\"display: flex; align-items: center; gap: 4px;\">\n              <input id=\"gl-years\" aria-label=\"Age, years\" type=\"number\" min=\"0\" max=\"20\" placeholder=\"—\" value=\"{{ years }}\" onchange=\"{{ onYears }}\" style=\"width: 34px; text-align: right; border: none; background: transparent; font-family: inherit; font-size: 17px; color: oklch(20% 0.02 220); outline: none;\">\n              <span style=\"font-size: 15px; color: oklch(56% 0.035 220);\">yr<\u002Fspan>\n              <input id=\"gl-months\" aria-label=\"Age, months\" type=\"number\" min=\"0\" max=\"11\" placeholder=\"—\" value=\"{{ months }}\" onchange=\"{{ onMonths }}\" style=\"width: 30px; text-align: right; border: none; background: transparent; font-family: inherit; font-size: 17px; color: oklch(20% 0.02 220); outline: none; margin-left: 6px;\">\n              <span style=\"font-size: 15px; color: oklch(56% 0.035 220);\">mo<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding: 12px 16px; border-bottom: 0.5px solid oklch(90% 0.005 240);\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between;\">\n              <label for=\"gl-height\" style=\"font-size: 15px; color: oklch(20% 0.02 220);\">Height / length<\u002Flabel>\n              <div style=\"display: flex; align-items: center; gap: 4px;\">\n                <input id=\"gl-height\" aria-label=\"Height or length, centimeters\" type=\"number\" placeholder=\"—\" step=\"0.1\" value=\"{{ height }}\" onchange=\"{{ onHeight }}\" style=\"width: 56px; text-align: right; border: none; background: transparent; font-family: inherit; font-size: 17px; color: oklch(20% 0.02 220); outline: none;\">\n                <span style=\"font-size: 15px; color: oklch(56% 0.035 220);\">cm<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ heightInvalid }}\">\n              <div style=\"font-size: 11.5px; color: oklch(55% 0.19 25); margin-top: 4px; text-align: right;\">Check this value — expected 30–200 cm<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"padding: 12px 16px; border-bottom: 0.5px solid oklch(90% 0.005 240);\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between;\">\n              <label for=\"gl-weight\" style=\"font-size: 15px; color: oklch(20% 0.02 220);\">Weight<\u002Flabel>\n              <div style=\"display: flex; align-items: center; gap: 4px;\">\n                <input id=\"gl-weight\" aria-label=\"Weight, kilograms\" type=\"number\" placeholder=\"—\" step=\"0.1\" value=\"{{ weight }}\" onchange=\"{{ onWeight }}\" style=\"width: 56px; text-align: right; border: none; background: transparent; font-family: inherit; font-size: 17px; color: oklch(20% 0.02 220); outline: none;\">\n                <span style=\"font-size: 15px; color: oklch(56% 0.035 220);\">kg<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ weightInvalid }}\">\n              <div style=\"font-size: 11.5px; color: oklch(55% 0.19 25); margin-top: 4px; text-align: right;\">Check this value — expected 1–150 kg<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"padding: 12px 16px; border-bottom: 0.5px solid oklch(90% 0.005 240);\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between;\">\n              <label for=\"gl-ofc\" style=\"font-size: 15px; color: oklch(20% 0.02 220);\">Head circumference<\u002Flabel>\n              <div style=\"display: flex; align-items: center; gap: 4px;\">\n                <input id=\"gl-ofc\" aria-label=\"Head circumference, centimeters\" type=\"number\" placeholder=\"—\" step=\"0.1\" value=\"{{ ofc }}\" onchange=\"{{ onOfc }}\" style=\"width: 56px; text-align: right; border: none; background: transparent; font-family: inherit; font-size: 17px; color: oklch(20% 0.02 220); outline: none;\">\n                <span style=\"font-size: 15px; color: oklch(56% 0.035 220);\">cm<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ ofcInvalid }}\">\n              <div style=\"font-size: 11.5px; color: oklch(55% 0.19 25); margin-top: 4px; text-align: right;\">Check this value — expected 20–70 cm<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"padding: 12px 16px;\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between;\">\n              <label for=\"gl-sh\" style=\"font-size: 15px; color: oklch(20% 0.02 220);\">Sitting height<\u002Flabel>\n              <div style=\"display: flex; align-items: center; gap: 4px;\">\n                <input id=\"gl-sh\" aria-label=\"Sitting height, centimeters\" type=\"number\" placeholder=\"—\" step=\"0.1\" value=\"{{ sittingHeight }}\" onchange=\"{{ onSittingHeight }}\" style=\"width: 56px; text-align: right; border: none; background: transparent; font-family: inherit; font-size: 17px; color: oklch(20% 0.02 220); outline: none;\">\n                <span style=\"font-size: 15px; color: oklch(56% 0.035 220);\">cm<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ sittingHeightInvalid }}\">\n              <div style=\"font-size: 11.5px; color: oklch(55% 0.19 25); margin-top: 4px; text-align: right;\">Check this value — expected 20–120 cm<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ ethnicityVisible }}\">\n            <div style=\"padding: 4px 16px 14px;\">\n              <div style=\"font-size: 11.5px; color: oklch(60% 0.02 220); margin-bottom: 7px;\">Population (for SH/H ratio reference)<\u002Fdiv>\n              <div role=\"radiogroup\" aria-label=\"Population\" style=\"display: flex; gap: 6px; flex-wrap: wrap;\">\n                <sc-for list=\"{{ ethnicityOptions }}\" as=\"opt\" hint-placeholder-count=\"2\">\n                  <button onclick=\"{{ opt.onClick }}\" aria-pressed=\"{{ opt.active }}\" style=\"padding: 5px 11px; border-radius: 20px; border: 1px solid {{ opt.border }}; font-size: 11px; font-weight: 500; cursor: pointer; color: {{ opt.color }}; background: {{ opt.bg }};\">{{ opt.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ ageNoteVisible }}\">\n          <div style=\"font-size: 12px; color: oklch(60% 0.02 220); padding: 6px 8px 0;\">{{ ageNoteText }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"padding: 18px 0 8px;\">\n        <div style=\"font-size: 13px; font-weight: 600; color: oklch(56% 0.035 220); text-transform: uppercase; letter-spacing: 0.02em; padding: 0 24px 6px;\">Reference population<\u002Fdiv>\n        <div role=\"radiogroup\" aria-label=\"Reference population\" style=\"display: flex; gap: 7px; overflow-x: auto; padding: 0 20px 4px; -webkit-overflow-scrolling: touch;\">\n          <sc-for list=\"{{ refOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ opt.onClick }}\" aria-pressed=\"{{ opt.active }}\" style=\"flex-shrink: 0; white-space: nowrap; padding: 6px 12px; border-radius: 20px; border: 1px solid {{ opt.border }}; font-size: 12.5px; font-weight: 500; cursor: pointer; color: {{ opt.color }}; background: {{ opt.bg }};\">{{ opt.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ emptyStateVisible }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin: 18px 20px 0; background: #fff; border-radius: 18px; padding: 44px 24px; text-align: center;\">\n          <div style=\"width: 40px; height: 40px; border-radius: 11px; background: oklch(93% 0.02 210); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-family: -apple-system, ui-rounded, system-ui; font-size: 18px; font-weight: 700; font-style: italic; color: oklch(50% 0.08 205);\">z<\u002Fdiv>\n          <div style=\"font-size: 15px; font-weight: 600; color: oklch(30% 0.02 220); margin-bottom: 5px;\">No measurements yet<\u002Fdiv>\n          <div style=\"font-size: 13px; color: oklch(56% 0.035 220); line-height: 1.5;\">Enter age plus height, weight, head circumference, or sitting height.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-for list=\"{{ tileGroups }}\" as=\"grp\" hint-placeholder-count=\"0\">\n        <div style=\"padding: 18px 20px 0;\">\n          <div style=\"font-size: 13px; font-weight: 600; color: oklch(56% 0.035 220); text-transform: uppercase; letter-spacing: 0.02em; padding: 0 4px 8px;\">{{ grp.label }}<\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px;\">\n            <sc-for list=\"{{ grp.tiles }}\" as=\"tile\" hint-placeholder-count=\"0\">\n              <div style=\"background: {{ tile.badgeBg }}; border-radius: 18px; padding: 14px 16px 15px;\">\n                <div style=\"font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: oklch(38% 0.03 220 / 75%); margin-bottom: 6px;\">{{ tile.label }}<\u002Fdiv>\n                <div style=\"font-family: -apple-system, ui-rounded, system-ui, sans-serif; font-weight: 700; font-size: 26px; color: {{ tile.color }}; line-height: 1.1;\">{{ tile.valueText }}<\u002Fdiv>\n                <div style=\"font-size: 11.5px; color: oklch(38% 0.03 220 / 90%); margin-top: 3px;\">{{ tile.measurementText }}<\u002Fdiv>\n                <sc-if value=\"{{ tile.hasGauge }}\">\n                  <div style=\"margin-top: 10px; position: relative; height: 4px; border-radius: 2px; background: linear-gradient(to right, oklch(58% 0.19 25), oklch(68% 0.16 55), oklch(64% 0.15 150), oklch(68% 0.16 55), oklch(58% 0.19 25));\">\n                    <div style=\"position: absolute; top: 50%; left: {{ tile.gaugePct }}%; transform: translate(-50%,-50%); width: 11px; height: 11px; border-radius: 50%; background: {{ tile.color }}; border: 2px solid #fff;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ tile.badgeText }}\">\n                  <div style=\"margin-top: 9px; font-size: 11px; font-weight: 600; color: {{ tile.color }};\">{{ tile.badgeText }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-if value=\"{{ tileGroups.length }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding: 16px 20px 0;\">\n          <button onclick=\"{{ copySummary }}\" aria-label=\"Copy results summary\" style=\"width: 100%; padding: 12px; border: none; border-radius: 14px; background: #fff; color: oklch(45% 0.06 210); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;\">{{ copyStatusText }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ bmiSection.rangeNoteVisible }}\">\n        <div style=\"margin: 10px 20px 0; font-size: 11.5px; color: oklch(60% 0.02 220);\">BMI SDS not available (age outside {{ refLabel }} BMI range)<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ proportionSection.shhrNoteVisible }}\">\n        <div style=\"margin: 10px 20px 0; font-size: 11.5px; color: oklch(60% 0.02 220);\">SH/H ratio SDS requires age 2–18 years (NHANES III range)<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-for list=\"{{ charts }}\" as=\"chart\" hint-placeholder-count=\"0\">\n        <sc-if value=\"{{ chart.visible }}\">\n          <div onclick=\"{{ chart.open }}\" style=\"margin: 18px 20px 0; background: #fff; border-radius: 18px; padding: 16px 16px 12px; cursor: pointer;\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;\">\n              <div style=\"font-size: 12px; font-weight: 600; color: oklch(56% 0.035 220); letter-spacing: 0.01em;\">{{ chart.title }}<\u002Fdiv>\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex-shrink: 0;\">\n                <path d=\"M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5\" stroke=\"oklch(65% 0.02 220)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <svg viewBox=\"{{ chart.viewBox }}\" style=\"width: 100%; height: auto; display: block;\">\n              <sc-for list=\"{{ chart.yTicks }}\" as=\"t\" hint-placeholder-count=\"0\">\n                <line x1=\"{{ t.x1 }}\" y1=\"{{ t.ly }}\" x2=\"{{ t.x2 }}\" y2=\"{{ t.ly }}\" stroke=\"oklch(93% 0.008 220)\" stroke-width=\"1\"><\u002Fline>\n                <text x=\"{{ t.tx }}\" y=\"{{ t.ty }}\" text-anchor=\"end\" font-size=\"9\" fill=\"oklch(65% 0.02 220)\">{{ t.label }}<\u002Ftext>\n              <\u002Fsc-for>\n              <sc-for list=\"{{ chart.xTicks }}\" as=\"t\" hint-placeholder-count=\"0\">\n                <line x1=\"{{ t.x }}\" y1=\"{{ t.y1 }}\" x2=\"{{ t.x }}\" y2=\"{{ t.y2 }}\" stroke=\"oklch(93% 0.008 220)\" stroke-width=\"1\"><\u002Fline>\n                <text x=\"{{ t.x }}\" y=\"{{ t.ty }}\" text-anchor=\"middle\" font-size=\"9\" fill=\"oklch(65% 0.02 220)\">{{ t.label }}<\u002Ftext>\n              <\u002Fsc-for>\n              <sc-for list=\"{{ chart.sdLines }}\" as=\"l\" hint-placeholder-count=\"0\">\n                <path d=\"{{ l.pathD }}\" fill=\"none\" stroke=\"{{ l.color }}\" stroke-width=\"{{ l.strokeWidth }}\" stroke-dasharray=\"{{ l.dash }}\" stroke-opacity=\"0.85\"><\u002Fpath>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ chart.patientVisible }}\">\n                <circle cx=\"{{ chart.patientCx }}\" cy=\"{{ chart.patientCy }}\" r=\"5\" fill=\"oklch(50% 0.1 205)\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n              <\u002Fsc-if>\n            <\u002Fsvg>\n            <div style=\"display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px;\">\n              <sc-for list=\"{{ chart.legend }}\" as=\"lg\" hint-placeholder-count=\"0\">\n                <div style=\"display: flex; align-items: center; gap: 4px; font-size: 9.5px; color: oklch(56% 0.035 220);\">\n                  <div style=\"width: 14px; height: 2px; background: {{ lg.color }}; opacity: 0.85; border-radius: 1px;\"><\u002Fdiv>{{ lg.label }}\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-for>\n\n      <sc-if value=\"{{ expandedChart }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position: absolute; inset: 0; z-index: 50; background: #fff; display: flex; flex-direction: column;\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 58px 20px 14px; flex-shrink: 0;\">\n            <div style=\"font-size: 15px; font-weight: 600; color: oklch(20% 0.02 220); padding-right: 12px;\">{{ expandedChart.title }}<\u002Fdiv>\n            <button onclick=\"{{ closeExpandedChart }}\" aria-label=\"Close\" style=\"width: 30px; height: 30px; border-radius: 15px; border: none; background: oklch(93% 0.008 220); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 13 13\" fill=\"none\">\n                <path d=\"M1 1l11 11M12 1L1 12\" stroke=\"oklch(45% 0.03 220)\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"flex: 1; overflow: auto; padding: 0 16px 24px;\">\n            <svg viewBox=\"{{ expandedChart.viewBox }}\" style=\"width: 100%; height: auto; display: block;\">\n              <sc-for list=\"{{ expandedChart.yTicks }}\" as=\"t\" hint-placeholder-count=\"0\">\n                <line x1=\"{{ t.x1 }}\" y1=\"{{ t.ly }}\" x2=\"{{ t.x2 }}\" y2=\"{{ t.ly }}\" stroke=\"oklch(93% 0.008 220)\" stroke-width=\"1\"><\u002Fline>\n                <text x=\"{{ t.tx }}\" y=\"{{ t.ty }}\" text-anchor=\"end\" font-size=\"9\" fill=\"oklch(65% 0.02 220)\">{{ t.label }}<\u002Ftext>\n              <\u002Fsc-for>\n              <sc-for list=\"{{ expandedChart.xTicks }}\" as=\"t\" hint-placeholder-count=\"0\">\n                <line x1=\"{{ t.x }}\" y1=\"{{ t.y1 }}\" x2=\"{{ t.x }}\" y2=\"{{ t.y2 }}\" stroke=\"oklch(93% 0.008 220)\" stroke-width=\"1\"><\u002Fline>\n                <text x=\"{{ t.x }}\" y=\"{{ t.ty }}\" text-anchor=\"middle\" font-size=\"9\" fill=\"oklch(65% 0.02 220)\">{{ t.label }}<\u002Ftext>\n              <\u002Fsc-for>\n              <sc-for list=\"{{ expandedChart.sdLines }}\" as=\"l\" hint-placeholder-count=\"0\">\n                <path d=\"{{ l.pathD }}\" fill=\"none\" stroke=\"{{ l.color }}\" stroke-width=\"{{ l.strokeWidth }}\" stroke-dasharray=\"{{ l.dash }}\" stroke-opacity=\"0.85\"><\u002Fpath>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ expandedChart.patientVisible }}\">\n                <circle cx=\"{{ expandedChart.patientCx }}\" cy=\"{{ expandedChart.patientCy }}\" r=\"5\" fill=\"oklch(50% 0.1 205)\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n              <\u002Fsc-if>\n            <\u002Fsvg>\n            <div style=\"display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px;\">\n              <sc-for list=\"{{ expandedChart.legend }}\" as=\"lg\" hint-placeholder-count=\"0\">\n                <div style=\"display: flex; align-items: center; gap: 4px; font-size: 11px; color: oklch(56% 0.035 220);\">\n                  <div style=\"width: 16px; height: 2px; background: {{ lg.color }}; opacity: 0.85; border-radius: 1px;\"><\u002Fdiv>{{ lg.label }}\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <details style=\"margin: 20px 20px 0; background: #fff; border-radius: 14px; padding: 2px 16px;\">\n        <summary style=\"font-size: 13px; font-weight: 500; color: oklch(45% 0.06 210); padding: 12px 0; cursor: pointer; list-style: none;\">About these references<\u002Fsummary>\n        <p style=\"font-size: 11.5px; color: oklch(50% 0.02 220); line-height: 1.7; padding: 0 0 14px; margin: 0;\">\n          For use by healthcare professionals. Interpret results in clinical context.<br>\n          LMS data extracted from official LMSGrowth reference files (Cole TJ, Pan H — MRC).<br>\n          UK-WHO: Cole/Freeman/Preece, Arch Dis Child 1995 &amp; Stat Med 1998; WHO MGRS 2006.<br>\n          CDC 2000: Kuczmarski RJ et al., Vital Health Stat 11(246), 2002.<br>\n          WHO 2006/2007: WHO Multicentre Growth Reference Study Group; de Onis M et al., Bull WHO 2007;85:660-7.<br>\n          Sitting height: British 1990 reference, sitting height added Feb 1998.<br>\n          SH/H ratio: Hawkes CP et al., J Pediatrics 2020 (NHANES III); Data in Brief 2020.<br>\n          HCH-Index: Dauber A et al. — cutoff of −2 suggests head-height disproportion (hypochondroplasia).\n        <\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    sex: \"male\", years: \"\", months: \"\", height: \"\", weight: \"\", ofc: \"\", sittingHeight: \"\",\n    ethnicity: \"nhw_ma\", refKey: \"uk_who\", dataLoaded: false, expandedChartIdx: null\n  };\n\n  componentDidMount() {\n    this.loadPersisted();\n    this.waitForData();\n  }\n\n  loadPersisted() {\n    try {\n      const raw = localStorage.getItem(\"growthline_patient_v1\");\n      if (raw) {\n        const saved = JSON.parse(raw);\n        if (saved && typeof saved === \"object\") this.setState(saved);\n      }\n    } catch (e) {}\n  }\n\n  persist(patch) {\n    try {\n      const merged = { ...this.state, ...patch };\n      const toSave = {\n        sex: merged.sex, years: merged.years, months: merged.months, height: merged.height,\n        weight: merged.weight, ofc: merged.ofc, sittingHeight: merged.sittingHeight,\n        ethnicity: merged.ethnicity, refKey: merged.refKey\n      };\n      localStorage.setItem(\"growthline_patient_v1\", JSON.stringify(toSave));\n    } catch (e) {}\n  }\n\n  copySummary(tileGroups) {\n    const lines = [];\n    tileGroups.forEach(g => {\n      lines.push(g.label + \":\");\n      g.tiles.forEach(t => {\n        lines.push(`  ${t.label}: ${t.valueText}${t.measurementText ? \" (\" + t.measurementText + \")\" : \"\"}${t.badgeText ? \" — \" + t.badgeText : \"\"}`);\n      });\n    });\n    const text = lines.join(\"\\n\");\n    let ok = false;\n    try {\n      const ta = document.createElement(\"textarea\");\n      ta.value = text;\n      ta.style.position = \"fixed\";\n      ta.style.opacity = \"0\";\n      document.body.appendChild(ta);\n      ta.focus();\n      ta.select();\n      ok = document.execCommand(\"copy\");\n      document.body.removeChild(ta);\n    } catch (e) {\n      ok = false;\n    }\n    this.setState({ copyStatus: ok ? \"copied\" : \"failed\" });\n    if (!ok && navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(text).then(\n        () => this.setState({ copyStatus: \"copied\" }),\n        () => this.setState({ copyStatus: \"failed\" })\n      );\n    }\n    clearTimeout(this._copyTimer);\n    this._copyTimer = setTimeout(() => this.setState({ copyStatus: null }), 2000);\n  }\n\n  waitForData() {\n    if (window.__GROWTH_LMS__ && window.__GROWTH_FNS__) {\n      this.LMS = window.__GROWTH_LMS__;\n      this.REF_LIST = window.__GROWTH_REF_LIST__;\n      this.interp = window.__GROWTH_FNS__.interp;\n      this.sds = window.__GROWTH_FNS__.sds;\n      this.lmsToVal = window.__GROWTH_FNS__.lmsToVal;\n      this.sdsColor = window.__GROWTH_FNS__.sdsColor;\n      this.heightText = window.__GROWTH_FNS__.heightText;\n      this.bmiText = window.__GROWTH_FNS__.bmiText;\n      this.setState({ dataLoaded: true });\n    } else {\n      setTimeout(() => this.waitForData(), 30);\n    }\n  }\n\n  GREEN = \"oklch(64% 0.15 150)\";\n  ORANGE = \"oklch(68% 0.16 55)\";\n  RED = \"oklch(58% 0.19 25)\";\n\n  fmtSigned(v, d) {\n    return (v >= 0 ? \"+\" : \"\") + v.toFixed(d == null ? 2 : d);\n  }\n\n  alphaBg(hexColor) {\n    var idx = hexColor.lastIndexOf(\")\");\n    return hexColor.slice(0, idx) + \" / 16%)\";\n  }\n\n  buildResult(label, value, measurement, unit, refLabel, interpFn) {\n    if (value === null || value === undefined) return { visible: false };\n    const col = this.sdsColor(value);\n    const bg = Math.abs(value) <= 1 ? this.alphaBg(this.GREEN) : Math.abs(value) <= 2 ? this.alphaBg(this.ORANGE) : this.alphaBg(this.RED);\n    const clamped = Math.max(-4, Math.min(4, value));\n    const gaugePct = ((clamped + 4) / 8) * 100;\n    return {\n      visible: true,\n      label,\n      valueText: this.fmtSigned(value),\n      measurementText: `${measurement} ${unit}`,\n      color: col,\n      gaugePct,\n      hasGauge: true,\n      badgeBg: bg,\n      badgeText: interpFn(value),\n      refLabel\n    };\n  }\n\n  buildChart(table, ageMo, patientVal, title) {\n    if (!table || !table.length) return { visible: false };\n    const ages = table.map(r => r.a);\n    const minAge = ages[0], maxAge = ages[ages.length - 1];\n    const allVals = [-2, 0, 2].flatMap(sdv => ages.map(a => this.lmsToVal(sdv, this.interp(table, a))));\n    const minY = Math.floor(Math.min(...allVals) / 5) * 5;\n    const maxY = Math.ceil(Math.max(...allVals) / 5) * 5;\n    const W = 460, H = 200, PL = 42, PR = 16, PT = 12, PB = 28;\n    const cW = W - PL - PR, cH = H - PT - PB;\n    const xp = a => PL + ((a - minAge) / (maxAge - minAge)) * cW;\n    const yp = y => PT + cH - ((y - minY) / (maxY - minY)) * cH;\n    const sdDefs = [\n      { sd: -2, color: this.RED, dash: \"4,3\", label: \"\\u22122 SD\" },\n      { sd: -1, color: this.ORANGE, dash: \"3,3\", label: \"\\u22121 SD\" },\n      { sd: 0, color: this.GREEN, dash: \"\", label: \"Median\" },\n      { sd: 1, color: this.ORANGE, dash: \"3,3\", label: \"+1 SD\" },\n      { sd: 2, color: this.RED, dash: \"4,3\", label: \"+2 SD\" },\n    ];\n    const sdLines = sdDefs.map(d => ({\n      color: d.color,\n      dash: d.dash,\n      label: d.label,\n      pathD: ages.map((a, i) => `${i === 0 ? \"M\" : \"L\"}${xp(a).toFixed(1)},${yp(this.lmsToVal(d.sd, this.interp(table, a))).toFixed(1)}`).join(\" \"),\n      strokeWidth: d.sd === 0 ? 1.8 : 1\n    }));\n    const yTicks = [];\n    const step = (maxY - minY) > 60 ? 20 : 10;\n    for (let y = minY; y <= maxY; y += step) yTicks.push({ x1: PL, x2: W - PR, tx: PL - 5, ly: yp(y), ty: yp(y) + 4, label: y });\n    const xTickCount = 6;\n    const xTicks = Array.from({ length: xTickCount + 1 }, (_, i) => {\n      const a = Math.round(minAge + (i * (maxAge - minAge)) / xTickCount);\n      return { x: xp(a), y1: PT, y2: H - PB, ty: H - PB + 12, label: `${a}m` };\n    });\n    const patientVisible = patientVal != null && ageMo >= minAge && ageMo <= maxAge;\n    return {\n      visible: true, title, viewBox: `0 0 ${W} ${H}`,\n      yTicks, xTicks, sdLines,\n      patientVisible, patientCx: patientVisible ? xp(ageMo) : 0, patientCy: patientVisible ? yp(patientVal) : 0,\n      legend: sdDefs.map(d => ({ color: d.color, label: d.label }))\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const onYears = e => { const p = { years: e.target.value }; this.setState(p); this.persist(p); };\n    const onMonths = e => {\n      const v = Math.max(0, Math.min(11, parseInt(e.target.value) || 0));\n      const p = { months: e.target.value === \"\" ? \"\" : String(v) };\n      this.setState(p); this.persist(p);\n    };\n    const onHeight = e => { const p = { height: e.target.value }; this.setState(p); this.persist(p); };\n    const onWeight = e => { const p = { weight: e.target.value }; this.setState(p); this.persist(p); };\n    const onOfc = e => { const p = { ofc: e.target.value }; this.setState(p); this.persist(p); };\n    const onSittingHeight = e => { const p = { sittingHeight: e.target.value }; this.setState(p); this.persist(p); };\n\n    const sexOptions = [\"male\", \"female\"].map(sv => {\n      const active = s.sex === sv;\n      return {\n        value: sv,\n        label: sv === \"male\" ? \"Male\" : \"Female\",\n        active,\n        onClick: () => { const p = { sex: sv }; this.setState(p); this.persist(p); },\n        color: active ? \"oklch(24% 0.045 231)\" : \"oklch(56% 0.035 220)\",\n        bg: active ? \"#fff\" : \"transparent\",\n        shadow: active ? \"0 2px 8px oklch(20% 0.02 220 / 10%)\" : \"none\"\n      };\n    });\n\n    if (!s.dataLoaded) {\n      return {\n        sex: s.sex, years: s.years, months: s.months, height: s.height, weight: s.weight,\n        ofc: s.ofc, sittingHeight: s.sittingHeight,\n        onYears, onMonths, onHeight, onWeight, onOfc, onSittingHeight,\n        sexOptions, refOptions: [], ethnicityOptions: [], ethnicityVisible: false,\n        ageNoteVisible: false, ageNoteText: \"\",\n        emptyStateVisible: true, tileGroups: [],\n        bmiSection: { visible: false }, proportionSection: { visible: false },\n        charts: [], refLabel: \"\",\n        heightInvalid: false, weightInvalid: false, ofcInvalid: false, sittingHeightInvalid: false,\n        copySummary: () => {}, copyStatusText: \"Copy summary\",\n        expandedChart: null, closeExpandedChart: () => {}\n      };\n    }\n\n    const REF_LIST = this.REF_LIST, LMS = this.LMS;\n    const ageMo = (parseFloat(s.years) || 0) * 12 + (parseInt(s.months) || 0);\n    const ref = LMS[s.refKey];\n    const hTable = ref && ref.height ? ref.height[s.sex] : null;\n    const wTable = ref && ref.weight ? ref.weight[s.sex] : null;\n    const bTable = ref && ref.bmi ? ref.bmi[s.sex] : null;\n    const oTable = ref && ref.ofc ? ref.ofc[s.sex] : null;\n    const shTable = LMS.british1990 && LMS.british1990.sitting_height ? LMS.british1990.sitting_height[s.sex] : null;\n    const shhrKey = s.ethnicity === \"nhb\" ? \"shhr_nhb\" : \"shhr_nhw_ma\";\n    const shhrTable = LMS[shhrKey] ? LMS[shhrKey][s.sex] : null;\n\n    const h = parseFloat(s.height), w = parseFloat(s.weight), o = parseFloat(s.ofc);\n    const heightInvalid = s.height !== \"\" && (h < 30 || h > 200);\n    const weightInvalid = s.weight !== \"\" && (w < 1 || w > 150);\n    const ofcInvalid = s.ofc !== \"\" && (o < 20 || o > 70);\n    const shValRaw = parseFloat(s.sittingHeight);\n    const sittingHeightInvalid = s.sittingHeight !== \"\" && (shValRaw < 20 || shValRaw > 120);\n    const hInRange = hTable && ageMo >= hTable[0].a && ageMo <= hTable[hTable.length - 1].a;\n    const wInRange = wTable && ageMo >= wTable[0].a && ageMo <= wTable[wTable.length - 1].a;\n    const bInRange = bTable && ageMo >= bTable[0].a && ageMo <= bTable[bTable.length - 1].a;\n    const oInRange = oTable && ageMo >= oTable[0].a && ageMo <= oTable[oTable.length - 1].a;\n\n    const hSDS = (!isNaN(h) && h > 0 && ageMo > 0 && hInRange) ? this.sds(h, ageMo, hTable) : null;\n    const wSDS = (!isNaN(w) && w > 0 && ageMo > 0 && wInRange) ? this.sds(w, ageMo, wTable) : null;\n    const bmi = (!isNaN(h) && !isNaN(w) && h > 0 && w > 0) ? w / ((h / 100) ** 2) : null;\n    const bmiSDS = (bmi && ageMo > 0 && bInRange) ? this.sds(bmi, ageMo, bTable) : null;\n    const ofcSDS = (!isNaN(o) && o > 0 && ageMo > 0 && oInRange) ? this.sds(o, ageMo, oTable) : null;\n    const hchi = (hSDS !== null && ofcSDS !== null) ? (hSDS - 0.5 * ofcSDS) : null;\n\n    const sh = parseFloat(s.sittingHeight);\n    const shInRange = shTable && ageMo >= shTable[0].a && ageMo <= shTable[shTable.length - 1].a;\n    const shSDS = (!isNaN(sh) && sh > 0 && ageMo > 0 && shInRange) ? this.sds(sh, ageMo, shTable) : null;\n    const shhRatio = (!isNaN(h) && !isNaN(sh) && h > 0 && sh > 0) ? sh / h : null;\n    const shhrInRange = shhrTable && ageMo >= shhrTable[0].a && ageMo <= shhrTable[shhrTable.length - 1].a;\n    const shhrSDS = (shhRatio && ageMo > 0 && shhrInRange) ? this.sds(shhRatio, ageMo, shhrTable) : null;\n\n    const hasResult = hSDS !== null || wSDS !== null || ofcSDS !== null || shSDS !== null;\n\n    const refOptions = REF_LIST.map(r => {\n      const active = s.refKey === r.key;\n      return {\n        label: r.label,\n        active,\n        onClick: () => { const p = { refKey: r.key }; this.setState(p); this.persist(p); },\n        border: active ? \"oklch(24% 0.045 231)\" : \"oklch(89% 0.015 220)\",\n        color: active ? \"#fff\" : \"oklch(56% 0.035 220)\",\n        bg: active ? \"oklch(24% 0.045 231)\" : \"oklch(97% 0.006 220)\"\n      };\n    });\n    const ethnicityOptions = [[\"nhw_ma\", \"NHW / Mexican-Am\"], [\"nhb\", \"Non-Hispanic Black\"]].map(([key, label]) => {\n      const active = s.ethnicity === key;\n      return {\n        label,\n        active,\n        onClick: () => { const p = { ethnicity: key }; this.setState(p); this.persist(p); },\n        border: active ? \"oklch(24% 0.045 231)\" : \"oklch(89% 0.015 220)\",\n        color: active ? \"#fff\" : \"oklch(56% 0.035 220)\",\n        bg: active ? \"oklch(24% 0.045 231)\" : \"oklch(97% 0.006 220)\"\n      };\n    });\n\n    const heightResult = this.buildResult(\"Height SDS\", hSDS, h, \"cm\", ref.label, this.heightText);\n    const weightResult = this.buildResult(\"Weight SDS\", wSDS, w, \"kg\", ref.label, this.heightText);\n    const ofcResult = this.buildResult(\"Head Circumference SDS\", ofcSDS, o, \"cm\", ref.label, this.heightText);\n    const shResult = this.buildResult(\"Sitting Height SDS\", shSDS, sh, \"cm\", \"British 1990\", this.heightText);\n\n    const bmiSdsVisible = bmiSDS !== null;\n    const bmiSection = bmi ? {\n      visible: true,\n      bmiText: bmi.toFixed(1),\n      sdsVisible: bmiSdsVisible,\n      sdsText: bmiSdsVisible ? this.fmtSigned(bmiSDS) : \"\",\n      color: bmiSdsVisible ? this.sdsColor(bmiSDS) : \"\",\n      badgeBg: bmiSdsVisible ? (Math.abs(bmiSDS) <= 1 ? this.alphaBg(this.GREEN) : Math.abs(bmiSDS) <= 2 ? this.alphaBg(this.ORANGE) : this.alphaBg(this.RED)) : \"\",\n      badgeText: bmiSdsVisible ? this.bmiText(bmiSDS) : \"\",\n      rangeNoteVisible: !bInRange && ageMo > 0\n    } : { visible: false };\n\n    const hchiVisible = hchi !== null;\n    const ofcSection = ofcSDS !== null ? {\n      visible: true,\n      ofcResult,\n      hchiVisible,\n      hchiText: hchiVisible ? this.fmtSigned(hchi) : \"\",\n      hchiColor: hchiVisible ? (hchi < -2 ? this.RED : \"#fff\") : \"\",\n      hchiBadgeBg: hchiVisible ? (hchi < -2 ? this.alphaBg(this.RED) : this.alphaBg(this.GREEN)) : \"\",\n      hchiBadgeText: hchiVisible ? (hchi < -2 ? \"Below \\u22122 cutoff (Dauber et al.)\" : \"Above HCH-I cutoff\") : \"\"\n    } : { visible: false };\n\n    const shhrVisible = shhrSDS !== null;\n    const clampedShhr = shhrVisible ? Math.max(-4, Math.min(4, shhrSDS)) : 0;\n    const proportionSection = shSDS !== null ? {\n      visible: true,\n      shResult,\n      shhrVisible,\n      shhrText: shhrVisible ? this.fmtSigned(shhrSDS) : \"\",\n      shhrColor: shhrVisible ? this.sdsColor(shhrSDS) : \"\",\n      shhrPctLabel: shhrVisible ? `${(shhRatio * 100).toFixed(1)}% \\u00b7 ${s.ethnicity === \"nhb\" ? \"NHB\" : \"NHW/Mex-Am\"} (NHANES III)` : \"\",\n      shhrGaugePct: shhrVisible ? ((clampedShhr + 4) / 8) * 100 : 0,\n      shhrBadgeBg: shhrVisible ? (Math.abs(shhrSDS) <= 2 ? this.alphaBg(this.GREEN) : this.alphaBg(this.RED)) : \"\",\n      shhrBadgeText: shhrVisible ? (shhrSDS > 2.5 ? \"High \\u2014 short-limb pattern\" : shhrSDS < -2.5 ? \"Low \\u2014 short-trunk pattern\" : \"Proportionate\") : \"\",\n      shhrNoteVisible: !!s.sittingHeight && !shhrInRange && ageMo > 0\n    } : { visible: false };\n\n    const charts = [];\n    if (hasResult && ageMo > 0) {\n      const sexLabel = s.sex === \"male\" ? \"Male\" : \"Female\";\n      if (hInRange && !isNaN(h) && h > 0) charts.push(this.buildChart(hTable, ageMo, h, `Height-for-age \\u00b7 ${ref.label} \\u00b7 ${sexLabel}`));\n      if (wInRange && !isNaN(w) && w > 0) charts.push(this.buildChart(wTable, ageMo, w, `Weight-for-age \\u00b7 ${ref.label} \\u00b7 ${sexLabel}`));\n      if (bmi && bInRange) charts.push(this.buildChart(bTable, ageMo, bmi, `BMI-for-age \\u00b7 ${ref.label} \\u00b7 ${sexLabel}`));\n      if (oInRange && !isNaN(o) && o > 0) charts.push(this.buildChart(oTable, ageMo, o, `Head circumference-for-age \\u00b7 ${ref.label} \\u00b7 ${sexLabel}`));\n    }\n    charts.forEach((c, i) => { c.open = () => this.setState({ expandedChartIdx: i }); });\n    const expandedChart = (s.expandedChartIdx != null && charts[s.expandedChartIdx]) ? charts[s.expandedChartIdx] : null;\n    const closeExpandedChart = () => this.setState({ expandedChartIdx: null });\n\n    const INK = \"oklch(32% 0.03 220)\";\n    const growthTiles = [];\n    if (heightResult.visible) growthTiles.push(heightResult);\n    if (weightResult.visible) growthTiles.push(weightResult);\n    if (bmiSection.visible) {\n      growthTiles.push({ visible: true, label: \"BMI\", valueText: bmiSection.bmiText, measurementText: \"kg/m\\u00b2\", color: INK, hasGauge: false, badgeBg: \"oklch(93% 0.008 220)\", badgeText: \"\", refLabel: \"\" });\n      if (bmiSection.sdsVisible) growthTiles.push({ visible: true, label: \"BMI SDS\", valueText: bmiSection.sdsText, measurementText: bmiSection.badgeText, color: bmiSection.color, hasGauge: false, badgeBg: bmiSection.badgeBg, badgeText: \"\", refLabel: \"\" });\n    }\n    const headTiles = [];\n    if (ofcSection.visible) {\n      headTiles.push(ofcSection.ofcResult);\n      if (ofcSection.hchiVisible) headTiles.push({ visible: true, label: \"HCH-I\", valueText: ofcSection.hchiText, measurementText: \"Height SDS \\u2212 \\u00bd \\u00d7 OFC SDS\", color: ofcSection.hchiColor === \"#fff\" ? INK : ofcSection.hchiColor, hasGauge: false, badgeBg: ofcSection.hchiBadgeBg, badgeText: ofcSection.hchiBadgeText, refLabel: \"\" });\n    }\n    const proportionTiles = [];\n    if (proportionSection.visible) {\n      proportionTiles.push(proportionSection.shResult);\n      if (proportionSection.shhrVisible) proportionTiles.push({ visible: true, label: \"SH/H Ratio SDS\", valueText: proportionSection.shhrText, measurementText: proportionSection.shhrPctLabel, color: proportionSection.shhrColor, hasGauge: true, gaugePct: proportionSection.shhrGaugePct, badgeBg: proportionSection.shhrBadgeBg, badgeText: proportionSection.shhrBadgeText, refLabel: \"\" });\n    }\n    const tileGroups = [];\n    if (growthTiles.length) tileGroups.push({ label: \"Growth\", tiles: growthTiles });\n    if (headTiles.length) tileGroups.push({ label: \"Head\", tiles: headTiles });\n    if (proportionTiles.length) tileGroups.push({ label: \"Body proportion\", tiles: proportionTiles });\n\n    const copyStatusText = s.copyStatus === \"copied\" ? \"Copied!\" : s.copyStatus === \"failed\" ? \"Couldn't copy\" : \"Copy summary\";\n\n    return {\n      tileGroups,\n      sex: s.sex, years: s.years, months: s.months, height: s.height, weight: s.weight,\n      ofc: s.ofc, sittingHeight: s.sittingHeight,\n      onYears, onMonths, onHeight, onWeight, onOfc, onSittingHeight,\n      sexOptions, refOptions, ethnicityOptions,\n      ethnicityVisible: !!s.sittingHeight,\n      ageNoteVisible: ageMo > 0,\n      ageNoteText: `${ageMo} months total`,\n      emptyStateVisible: !hasResult,\n      bmiSection, proportionSection,\n      charts,\n      refLabel: ref.label,\n      heightInvalid, weightInvalid, ofcInvalid, sittingHeightInvalid,\n      copySummary: () => this.copySummary(tileGroups),\n      copyStatusText,\n      expandedChart, closeExpandedChart\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
